name: Pi Coding Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  # Trigger 1: New issue labeled "pi-agent"
  from-issue:
    if: github.event_name == 'issues' && github.event.label.name == 'pi-agent'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @mariozechner/pi-coding-agent
      - run: npm ci && npx playwright install --with-deps chromium

      - name: Collect issue context
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const fn = require('./.github/scripts/collect-issue-context.js');
            await fn({ github, context, core });

      - name: Create branch
        run: |
          git config user.name "pi-agent[bot]"
          git config user.email "pi-agent[bot]@users.noreply.github.com"
          git checkout -b ${{ steps.issue.outputs.branch }}

      - name: Run pi agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pi --no-session -p @/tmp/issue-prompt.md

      - name: Run tests
        run: ./.github/scripts/run-tests.sh

      - name: Commit and push
        id: push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat: implement issue #${{ steps.issue.outputs.number }}

            Automated by pi coding agent.
            Closes #${{ steps.issue.outputs.number }}"
            git push --force origin ${{ steps.issue.outputs.branch }}
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.push.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.issue.outputs.branch }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
        with:
          script: |
            const fn = require('./.github/scripts/create-pr.js');
            await fn({ github, context, core });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          COMMENT_TARGET: ${{ steps.issue.outputs.number }}
        with:
          script: |
            const fn = require('./.github/scripts/comment-on-failure.js');
            await fn({ github, context, core });

  # Trigger 2: Comment on a PR created by pi-agent
  from-pr-comment:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request
      && startsWith(github.event.issue.title, '[pi-agent]')
      && github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.issue.number,
            });
            core.setOutput('branch', pr.data.head.ref);
            core.setOutput('number', pr.data.number);
            const match = pr.data.body?.match(/#(\d+)/);
            core.setOutput('issue_number', match ? match[1] : '');

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @mariozechner/pi-coding-agent
      - run: npm ci && npx playwright install --with-deps chromium

      - name: Collect PR context
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          ISSUE_NUMBER: ${{ steps.pr.outputs.issue_number }}
        with:
          script: |
            const fn = require('./.github/scripts/collect-pr-context.js');
            await fn({ github, context, core });

      - name: Run pi agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pi --no-session -p @/tmp/pr-prompt.md

      - name: Run tests
        run: ./.github/scripts/run-tests.sh

      - name: Commit and push
        id: push
        run: |
          git config user.name "pi-agent[bot]"
          git config user.email "pi-agent[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "fix: address PR #${{ steps.pr.outputs.number }} review feedback

            Automated by pi coding agent."
            git push origin ${{ steps.pr.outputs.branch }}
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: steps.push.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const fn = require('./.github/scripts/comment-on-pr.js');
            await fn({ github, context, core });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          COMMENT_TARGET: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const fn = require('./.github/scripts/comment-on-failure.js');
            await fn({ github, context, core });
